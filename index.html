<!DOCTYPE html>
<html>
<head>
  <title>TEAM ROBO | Jalaj</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
    }

    header {
      background: #1e293b;
      padding: 20px;
    }

    h1 {
      color: #22c55e;
    }

    .container {
      margin-top: 40px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
      transform: scale(1.1);
    }

    #output {
      margin-top: 30px;
      font-size: 18px;
      color: #38bdf8;
    }

    img {
      margin-top: 20px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<header>
  <h1>TEAM ROBO 🚀</h1>
  <p>Interactive Website by Jalaj</p>
</header>

<div class="container">

  <button onclick="showMessage()">Show Message</button>
  <button onclick="changeColor()">Change Background</button>
  <button onclick="showImage()">Show Robot</button>
  <button onclick="hideImage()">Hide Robot</button>

  <div id="output"></div>

  <img id="robotImg" src="https://via.placeholder.com/300" style="display:none;">

</div>

<script>
  function showMessage() {
    document.getElementById("output").innerText = "Welcome to TEAM ROBO 😎";
  }

  function changeColor() {
    document.body.style.background =
      "#" + Math.floor(Math.random()*16777215).toString(16);
  }

  function showImage() {
    document.getElementById("robotImg").style.display = "block";
  }

  function hideImage() {
    document.getElementById("robotImg").style.display = "none";
  }
</script>

</body>
</html>
