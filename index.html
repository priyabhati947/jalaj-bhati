<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalaj Singh Bhati</title>
</head>
<body>
    <h1>Website Feedback Form</h1>

    <form action="https://jalaj-singh-bhati.onrender.com/submit" method="POST">

        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="feedback"><br><br>

        <p>How would you rate your experience?</p>
        <input type="radio" id="excellent" name="feedback" value="Excellent">
        <label for="excellent">Excellent</label><br>

        <input type="radio" id="good" name="feedback" value="Good">
        <label for="good">Good</label><br>

        <input type="radio" id="poor" name="feedback" value="Poor">
        <label for="poor">Poor</label><br><br>

        <label for="suggestions">What would you like us to improve?</label><br>
        <select id="suggestions" name="feedback">
            <option value="design">Design</option>
            <option value="content">Content</option>
            <option value="navigation">Navigation</option>
            <option value="performance">Performance</option>
        </select><br><br>

        <button type="submit">Submit Feedback</button>

    </form>
</body>
</html>
