<!DOCTYPE html>
<html>
<head>
  <title>Jalaj | Web Developer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      scroll-behavior: smooth;
    }

    /* Navbar */
    nav {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #22c55e;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
      color: #22c55e;
    }

    .hero p {
      font-size: 18px;
    }

    /* Sections */
    section {
      padding: 60px 20px;
      text-align: center;
    }

    /* Cards */
    .card {
      background: rgba(255,255,255,0.05);
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.6);
    }

  </style>
</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero" id="home">
  <h1>Jalaj 🚀</h1>
  <p>I build modern websites and robotics projects</p>
</div>

<section id="projects">
  <h2>My Projects</h2>

  <div class="card">
    <h3>TEAM ROBO Website</h3>
    <p>My robotics project website</p>
    <button onclick="openProject('https://priyabhati947.github.io/my-website')">View</button>
  </div>

  <div class="card">
    <h3>Interactive Form</h3>
    <p>Animated user input form</p>
    <button onclick="alert('Add your link later')">View</button>
  </div>

</section>

<section id="contact">
  <h2>Contact Me</h2>
  <p>WhatsApp: Your Number</p>
  <p>Email: your@email.com</p>
</section>

<footer>
  <p>© 2026 Jalaj Portfolio</p>
</footer>

<script>
  function openProject(link) {
    window.open(link, "_blank");
  }
</script>

</body>
</html>
