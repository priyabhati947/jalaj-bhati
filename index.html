<!DOCTYPE html>
<html>
<head>
  <title>Radhe Radhe Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    /* Radhe Radhe text */
    #title {
      position: fixed;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: #22c55e;
      transition: all 1.5s ease;
    }

    /* After animation (move to top) */
    .top {
      top: 20px !important;
      transform: translateY(0) !important;
      font-size: 24px !important;
    }

    /* Form */
    #formSection {
      margin-top: 120px;
      opacity: 0;
      transition: 1s;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 220px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

  </style>
</head>

<body>

<div id="title">Radhe Radhe 🙏</div>

<div id="formSection">
  <h2>Enter Your Details</h2>

  <input type="text" id="name" placeholder="Your Name"><br>
  <input type="text" id="class" placeholder="Your Class"><br>
  <input type="number" id="age" placeholder="Your Age"><br>

  <button onclick="submitForm()">Submit</button>
</div>

<script>
  // Move text to top after 2 seconds
  setTimeout(() => {
    document.getElementById("title").classList.add("top");
  }, 2000);

  // Show form after 3 seconds
  setTimeout(() => {
    document.getElementById("formSection").style.opacity = "1";
  }, 3000);

  function submitForm() {
    let name = document.getElementById("name").value;
    let cls = document.getElementById("class").value;
    let age = document.getElementById("age").value;

    alert("Radhe Radhe " + name + " 🙏");
  }
</script>

</body>
</html>
