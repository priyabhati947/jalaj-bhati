<!DOCTYPE html>
<html>
<head>
  <title>Radhe Radhe Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    /* Splash Animation */
    #splash {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      color: #22c55e;
      animation: moveUp 2s forwards;
      animation-delay: 1s;
    }

    @keyframes moveUp {
      0% {transform: translateY(0);}
      100% {transform: translateY(-80vh); font-size: 20px;}
    }

    /* Form Section */
    #formSection {
      margin-top: 150px;
      opacity: 0;
      transition: 1s;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div id="splash">Radhe Radhe 🙏</div>

<div id="formSection">
  <h2>Enter Your Details</h2>

  <input type="text" placeholder="Your Name"><br>
  <input type="text" placeholder="Your Class"><br>
  <input type="number" placeholder="Your Age"><br>

  <button onclick="submitForm()">Submit</button>
</div>

<script>
  // Show form after animation
  setTimeout(() => {
    document.getElementById("formSection").style.opacity = "1";
  }, 2500);

  function submitForm() {
    alert("Details Submitted 🙏");
  }
</script>

</body>
</html>
